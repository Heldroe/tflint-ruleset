version: 2

project_name: tflint-ruleset-terraform-style

before:
  hooks:
    - go mod tidy

env:
  - CGO_ENABLED=0
builds:
  - ldflags:
      - -s -w -X main.version={{.Version}}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_386
      - linux_amd64
      - linux_arm
      - linux_arm64
      - windows_386
      - windows_amd64
    hooks:
      post:
        - mkdir -p ./dist/raw
        - cp "{{ .Path }}" "./dist/raw/{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    binary: tflint-ruleset-terraform_style

archives:
  - name_template: "tflint-ruleset-terraform_style_{{ .Os }}_{{ .Arch }}"
    formats: zip # Required by tflint
    files:
      - none*

checksum:
  name_template: "checksums.txt"
  extra_files:
    - glob: ./dist/raw/*

signs:
  - artifacts: checksum
    args: ["--batch", "-u", "{{ .Env.GPG_FINGERPRINT }}", "--output", "${signature}", "--detach-sign", "${artifact}"]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: Heldroe
    name: tflint-ruleset-terraform-style
